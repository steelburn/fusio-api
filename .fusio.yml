# ==============================================================================
# Fusio Deploy Configuration
# ==============================================================================
# This is the central entry point for your Fusio application layout. It uses
# YAML includes (!include) to modularize and organize your resources into dedicated
# files, making your configuration highly maintainable and trackable in Git.
#
# To deploy all included resources to your environment, run:
# > php bin/fusio deploy
#
# Structure Guide:
# - operation:  Defines your API endpoints, routing, and business logic mapping.
# - schema:     Defines request/response data structures.
# - connection: Manages integrations (e.g., databases, HTTP clients, SMTP).
# - config:     Handles system and application-level environment variables.
#
# Resources & Documentation:
# - Examples:      https://github.com/apioo/fusio-framework
# - Documentation: https://docs.fusio-project.org/docs/development/deployment_system
# ==============================================================================

#operation: !include resources/operations.yaml
#schema: !include resources/schemas.yaml
#connection: !include resources/connections.yaml
#config: !include resources/config.yaml
